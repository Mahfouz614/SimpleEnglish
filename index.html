<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
    <title>LearnEnglish - Master the Language</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="welcome-overlay" class="overlay">
        <div class="welcome-box">
            <h1 class="pop-in">Welcome to LearnEnglish!</h1>
            <p class="fade-in-delayed">Your journey to fluency starts here.</p>
            <button id="start-btn" class="btn pulse">Get Started</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div class="logo">Learn<span>English</span></div>
            <div class="user-profile" id="user-badge">Guest User</div>
        </header>

        <main class="container">
            <section class="intro-card">
                <h2>Test Your English Skills</h2>
                <p>Select an answer carefully. Security protocols are active to ensure fair scoring.</p>
            </section>

            <section class="quiz-container">
                <div class="quiz-header">
                    <span id="question-number">Question 1 of 3</span>
                    <div class="progress-bar"><div id="progress"></div></div>
                </div>
                
                <div id="quiz-body">
                    <h3 id="question-text">Loading question...</h3>
                    <div class="options-grid" id="options-container">
                        </div>
                </div>

                <div class="quiz-footer">
                    <button id="submit-btn" class="btn disabled" disabled>Submit Answer</button>
                    <button id="next-btn" class="btn hidden">Next Question</button>
                </div>
            </section>

            <section id="result-container" class="hidden scale-up">
                <h2>Quiz Completed! 🎉</h2>
                <p>Your Secure Score: <span id="score-display">0</span>%</p>
                <button id="retry-btn" class="btn">Try Again</button>
            </section>
        </main>
    </div>

    <script src="auth.js" defer></script>
    <script src="quiz.js" defer></script>
</body>
</html>
